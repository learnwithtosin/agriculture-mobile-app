<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Landing</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            playfair: ['Playfair Display', 'serif'],
            poppins: ['Poppins', 'sans-serif'],
          },
          colors: {
            'agro-green': '#1a5c2a',
            'agro-green-mid': '#2d7a3a',
            'agro-yellow': '#f5c800',
          },
          backgroundImage: {
            'farm': "linear-gradient(to bottom, rgba(30,40,55,0.72) 0%, rgba(20,30,20,0.55) 50%, rgba(10,20,10,0.75) 100%), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?w=1600&q=80')",
          },
          keyframes: {
            fadeDown: {
              '0%': { opacity: '0', transform: 'translateY(-24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            popIn: {
              '0%': { opacity: '0', transform: 'scale(0.7)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            fadeDown: 'fadeDown 0.9s ease both',
            popIn: 'popIn 1s 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both',
            fadeUp: 'fadeUp 1s 0.6s ease both',
          },
        },
      },
    }
  </script>
</head>
<body class="font-poppins">

  <div class="relative w-full min-h-screen bg-farm bg-cover bg-center flex flex-col">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-6 pt-4 pb-2 text-white text-sm font-semibold">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M3.5 6.5a6.5 6.5 0 0 1 9 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 4A9.9 9.9 0 0 1 15 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white"/><rect x="2" y="2" width="17" height="9" rx="2" fill="white"/><path d="M23.5 4.5v4a2 2 0 0 0 0-4z" fill="white"/></svg>
      </div>
    </div>

    <!-- Headline -->
    <div class="animate-fadeDown flex flex-col items-center text-center px-8 mt-10">
      <h1 class="font-playfair text-4xl sm:text-5xl leading-tight text-white drop-shadow-lg">
        Grow smarter with<br/>Our <span class="text-agro-yellow">AgroFarm</span>
      </h1>
      <svg class="mt-1 w-40" viewBox="0 0 160 14" fill="none">
        <path d="M4 10 Q80 0 156 10" stroke="#f5c800" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Logo Circle -->
    <div class="animate-popIn flex justify-center mt-14">
      <div class="w-48 h-48 sm:w-56 sm:h-56 rounded-full bg-agro-green border-4 border-white/85 flex flex-col items-center justify-center gap-2 shadow-2xl">
        <svg class="w-20 h-20 sm:w-24 sm:h-24" viewBox="0 0 90 90" fill="none">
          <circle cx="45" cy="18" r="8" fill="white"/>
          <path d="M30 38 Q35 28 45 30 Q55 28 60 38" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M45 30 Q43 46 42 56" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <path d="M42 56 Q22 44 28 28 Q38 36 42 56Z" fill="white" opacity="0.9"/>
          <path d="M42 56 Q62 44 56 28 Q46 36 42 56Z" fill="white" opacity="0.75"/>
          <path d="M42 56 Q38 68 42 78 Q46 68 42 56Z" fill="white"/>
          <line x1="42" y1="56" x2="42" y2="78" stroke="white" stroke-width="2"/>
        </svg>
        <span class="text-white font-semibold text-base sm:text-lg tracking-wide">AgroFarm</span>
      </div>
    </div>

    <!-- Spacer pushes bottom content down -->
    <div class="flex-1"></div>

    <!-- Bottom App Name -->
    <div class="animate-fadeUp text-center text-white/85 text-sm font-medium tracking-wide pb-4">
      AgroFarm
    </div>

    <!-- Home Indicator -->
    <div class="flex justify-center pb-3">
      <div class="w-28 h-1 bg-white/40 rounded-full"></div>
    </div>

    <!-- Invisible full-screen tap link to page 2 -->
    <a href="page-two.html" class="absolute inset-0"></a>

  </div>

</body>
</html>
