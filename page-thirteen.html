<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Dealer Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins', 'sans-serif'] },
          colors: {
            'agro-green': '#1a5c2a',
            'agro-green-mid': '#2d7a3a',
            'agro-yellow': '#f5c800',
            'agro-yellow-icon': '#c8b800',
          },
          backgroundImage: {
            'wheat': "linear-gradient(to bottom, rgba(20,15,5,0.45) 0%, rgba(20,15,5,0.55) 100%), url('https://images.unsplash.com/photo-1574943320219-553eb213f72d?w=1200&q=80')",
          },
          keyframes: {
            fadeDown: {
              '0%': { opacity: '0', transform: 'translateY(-16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            fadeDown: 'fadeDown 0.7s ease both',
            fadeUp: 'fadeUp 0.7s 0.2s ease both',
            fadeUpD1: 'fadeUp 0.7s 0.32s ease both',
            fadeUpD2: 'fadeUp 0.7s 0.44s ease both',
          },
        },
      },
    }
  </script>
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen flex flex-col">

    <!-- Hero Header -->
    <div class="relative bg-wheat bg-cover bg-center px-6 pt-4 pb-8">
      <!-- Status Bar -->
      <div class="flex items-center justify-between text-white text-sm font-semibold mb-5">
        <span>9:41</span>
        <div class="flex items-center gap-1.5">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M3.5 6.5a6.5 6.5 0 0 1 9 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 4A9.9 9.9 0 0 1 15 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white"/><rect x="2" y="2" width="17" height="9" rx="2" fill="white"/><path d="M23.5 4.5v4a2 2 0 0 0 0-4z" fill="white"/></svg>
        </div>
      </div>

      <!-- Greeting + avatar -->
      <div class="animate-fadeDown flex items-center justify-between">
        <h1 class="text-white font-extrabold text-4xl sm:text-5xl">Hi,Saman</h1>
        <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-white border-2 border-white/60 flex items-center justify-center shadow-lg flex-shrink-0">
          <svg class="w-10 h-10 sm:w-12 sm:h-12" viewBox="0 0 80 80" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <!-- Cap -->
            <path d="M24 30 Q24 20 40 20 Q56 20 56 30"/>
            <rect x="21" y="28" width="38" height="5" rx="2.5"/>
            <!-- Head -->
            <circle cx="40" cy="42" r="10"/>
            <!-- Body -->
            <path d="M28 56 Q28 50 40 48 Q52 50 52 56"/>
            <!-- Badge -->
            <rect x="43" y="52" width="8" height="5" rx="1.5"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Main grid area -->
    <div class="flex-1 relative px-5 pt-6 pb-4"
      style="background: linear-gradient(to bottom, rgba(80,100,80,0.55) 0%, rgba(60,80,60,0.7) 100%), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?w=1200&q=80') center/cover no-repeat;">

      <!-- 2x2 Card Grid -->
      <div class="animate-fadeUp grid grid-cols-2 gap-4 mb-6">

        <!-- My Products -->
        <a href="page-fourteen.html" class="relative bg-white rounded-2xl border-2 border-agro-green p-5 flex flex-col items-start gap-3 shadow hover:shadow-md transition-shadow">
          <div class="absolute -top-4 left-4 w-12 h-12 bg-agro-yellow rounded-xl flex items-center justify-center shadow">
            <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <!-- Store front -->
              <rect x="3" y="10" width="22" height="15" rx="2"/>
              <path d="M3 10 L7 4 h14 L25 10"/>
              <rect x="10" y="16" width="8" height="9" rx="1"/>
              <path d="M3 10 h22"/>
            </svg>
          </div>
          <div class="mt-6">
            <p class="text-gray-900 font-bold text-sm sm:text-base leading-tight">My<br/>Products</p>
          </div>
        </a>

        <!-- Orders -->
        <a href="page-fourteen.html" class="relative bg-white rounded-2xl border-2 border-blue-500 p-5 flex flex-col items-start gap-3 shadow hover:shadow-md transition-shadow">
          <div class="absolute -top-4 left-4 w-12 h-12 bg-agro-yellow rounded-xl flex items-center justify-center shadow">
            <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <!-- Clipboard -->
              <rect x="5" y="6" width="18" height="20" rx="2"/>
              <rect x="10" y="3" width="8" height="5" rx="2"/>
              <!-- Lightning bolt -->
              <path d="M15 11 L12 17 h4 L13 23" stroke-width="2"/>
            </svg>
          </div>
          <div class="mt-6">
            <p class="text-gray-900 font-bold text-sm sm:text-base">Orders</p>
          </div>
        </a>

        <!-- Payment -->
        <a href="page-nine.html" class="relative bg-white rounded-2xl border-2 border-agro-green p-5 flex flex-col items-start gap-3 shadow hover:shadow-md transition-shadow">
          <div class="absolute -top-4 left-4 w-12 h-12 bg-agro-yellow rounded-xl flex items-center justify-center shadow">
            <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <!-- Card -->
              <rect x="3" y="7" width="22" height="14" rx="2"/>
              <line x1="3" y1="12" x2="25" y2="12"/>
              <!-- Pin/location dot -->
              <circle cx="20" cy="18" r="2"/>
              <path d="M20 16 v-2"/>
            </svg>
          </div>
          <div class="mt-6">
            <p class="text-gray-900 font-bold text-sm sm:text-base">Payment</p>
          </div>
        </a>

        <!-- Customer Chat -->
        <a href="page-fourteen.html" class="relative bg-white rounded-2xl border-2 border-red-400 p-5 flex flex-col items-start gap-3 shadow hover:shadow-md transition-shadow">
          <div class="absolute -top-4 left-4 w-12 h-12 bg-agro-yellow rounded-xl flex items-center justify-center shadow">
            <svg class="w-7 h-7" viewBox="0 0 28 28" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <!-- Two speech bubbles -->
              <path d="M4 6 Q4 3 7 3 h10 Q20 3 20 6 v6 Q20 9 17 9 H10 L6 12 V9 Q4 9 4 6z"/>
              <path d="M20 9 h2 Q26 9 26 12 v5 Q26 15 23 15 H20 l-3 3 v-3 H15 Q12 15 12 12"/>
            </svg>
          </div>
          <div class="mt-6">
            <p class="text-gray-900 font-bold text-sm sm:text-base leading-tight">Customer<br/>Chat</p>
          </div>
        </a>

      </div>

      <!-- Store Locator row -->
      <div class="animate-fadeUpD1 flex items-center gap-4 px-2">
        <!-- Store + pin icon -->
        <div class="flex-shrink-0">
          <svg class="w-14 h-14" viewBox="0 0 56 56" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <!-- Store building -->
            <rect x="8" y="22" width="24" height="26" rx="2"/>
            <path d="M8 22 L12 12 h16 L32 22"/>
            <rect x="14" y="30" width="12" height="18" rx="1"/>
            <path d="M8 22 h24"/>
            <!-- Location pin -->
            <circle cx="42" cy="18" r="8"/>
            <path d="M42 26 Q42 32 42 36" stroke-width="2"/>
            <circle cx="42" cy="18" r="3" fill="white"/>
          </svg>
        </div>
        <div>
          <p class="text-white font-bold text-base sm:text-lg">Store Locator</p>
          <p class="text-white/75 text-xs sm:text-sm">Find Your Nearest Store</p>
        </div>
      </div>

    </div>

    <!-- Bottom Nav -->
    <div class="animate-fadeUpD2 bg-white border-t border-gray-200 flex items-center justify-around px-6 py-3 shadow-lg">
      <a href="page-13-dealer-dashboard.html" class="text-gray-800 hover:text-agro-green transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5L13 3l10 7.5V22a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V10.5z"/>
          <path d="M9 23V13h8v10"/>
        </svg>
      </a>
      <a href="page-fourteen.html" class="text-gray-500 hover:text-agro-green transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="7" x2="23" y2="7"/>
          <line x1="3" y1="13" x2="23" y2="13"/>
          <line x1="3" y1="19" x2="23" y2="19"/>
        </svg>
      </a>
      <a href="page-fourteen.html" class="text-gray-500 hover:text-agro-green transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="13" cy="9" r="4"/>
          <path d="M5 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
        </svg>
      </a>
      <a href="page-five.html" class="text-gray-500 hover:text-red-500 transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 17l4-4-4-4"/>
          <path d="M21 13H10"/>
          <path d="M10 21H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"/>
        </svg>
      </a>
    </div>

  </div>

</body>
</html>
