<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Farmer Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            playfair: ['Playfair Display', 'serif'],
            poppins: ['Poppins', 'sans-serif'],
          },
          colors: {
            'agro-green': '#1a5c2a',
            'agro-green-mid': '#2d7a3a',
            'agro-yellow': '#f5c800',
            'agro-peach': '#e8b87a',
          },
          backgroundImage: {
            'farm': "linear-gradient(to bottom, rgba(25,35,50,0.68) 0%, rgba(15,25,15,0.42) 48%, rgba(8,18,8,0.68) 100%), url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?w=1600&q=80')",
          },
          keyframes: {
            fadeDown: {
              '0%': { opacity: '0', transform: 'translateY(-18px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            popIn: {
              '0%': { opacity: '0', transform: 'scale(0.7)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(18px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            fadeDown: 'fadeDown 0.7s ease both',
            popIn: 'popIn 0.8s 0.2s cubic-bezier(0.175,0.885,0.32,1.275) both',
            fadeUp: 'fadeUp 0.7s 0.35s ease both',
            fadeUpDelay: 'fadeUp 0.7s 0.5s ease both',
          },
        },
      },
    }
  </script>
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen bg-farm bg-cover bg-center flex flex-col">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-6 pt-4 pb-2 text-white text-sm font-semibold">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M3.5 6.5a6.5 6.5 0 0 1 9 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 4A9.9 9.9 0 0 1 15 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white"/><rect x="2" y="2" width="17" height="9" rx="2" fill="white"/><path d="M23.5 4.5v4a2 2 0 0 0 0-4z" fill="white"/></svg>
      </div>
    </div>

    <!-- Header: Logo + Welcome -->
    <div class="animate-fadeDown flex items-center gap-3 px-6 mt-4">
      <!-- Small logo circle -->
      <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-agro-green border-2 border-white/80 flex items-center justify-center flex-shrink-0 shadow-md">
        <svg class="w-7 h-7" viewBox="0 0 90 90" fill="none">
          <circle cx="45" cy="18" r="8" fill="white"/>
          <path d="M42 56 Q22 44 28 28 Q38 36 42 56Z" fill="white" opacity="0.9"/>
          <path d="M42 56 Q62 44 56 28 Q46 36 42 56Z" fill="white" opacity="0.75"/>
          <path d="M42 56 Q38 68 42 78 Q46 68 42 56Z" fill="white"/>
        </svg>
      </div>
      <h1 class="font-playfair font-extrabold text-agro-yellow text-4xl sm:text-5xl italic">Welcome !</h1>
    </div>

    <!-- Farmer icon circle -->
    <div class="animate-popIn flex justify-center mt-10">
      <div class="w-52 h-52 sm:w-60 sm:h-60 rounded-full bg-white border-4 border-white shadow-2xl flex items-center justify-center">
        <svg class="w-36 h-36 sm:w-40 sm:h-40" viewBox="0 0 120 120" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Hat brim -->
          <ellipse cx="52" cy="36" rx="22" ry="5"/>
          <!-- Hat top -->
          <path d="M34 36 Q34 22 52 22 Q70 22 70 36"/>
          <!-- Head -->
          <circle cx="52" cy="50" r="12"/>
          <!-- Shirt collar V -->
          <path d="M40 68 L52 76 L64 68"/>
          <!-- Body / overalls -->
          <rect x="36" y="68" width="32" height="28" rx="4"/>
          <!-- Overalls straps -->
          <path d="M44 68 L44 60"/>
          <path d="M60 68 L60 60"/>
          <!-- Pocket -->
          <rect x="46" y="74" width="12" height="8" rx="2"/>
          <!-- Plant sprig (right side) -->
          <path d="M80 80 Q82 68 86 62" stroke="#2d7a3a" stroke-width="2"/>
          <path d="M83 70 Q88 66 90 70" stroke="#2d7a3a" stroke-width="2" fill="none"/>
          <path d="M85 62 Q90 58 92 62" stroke="#2d7a3a" stroke-width="2" fill="none"/>
          <!-- Leaf nodes -->
          <circle cx="86" cy="62" r="1.5" fill="#2d7a3a" stroke="none"/>
          <circle cx="83" cy="70" r="1.5" fill="#2d7a3a" stroke="none"/>
        </svg>
      </div>
    </div>

    <!-- Farmer label -->
    <div class="animate-fadeUp flex justify-center mt-6">
      <div class="bg-agro-peach text-gray-900 font-bold text-lg sm:text-xl px-14 py-3 rounded-xl shadow">
        Farmer
      </div>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Get Started button -->
    <div class="animate-fadeUpDelay flex justify-center mb-10">
      <a href="page-twelve.html" class="bg-agro-yellow text-gray-900 font-bold text-base sm:text-lg rounded-full px-12 py-3.5 flex items-center gap-3 shadow-lg hover:brightness-105 transition-all">
        Get Started
        <span class="tracking-tighter text-xl font-extrabold">&raquo;</span>
      </a>
    </div>

    <!-- Home Indicator -->
    <div class="flex justify-center pb-3">
      <div class="w-28 h-1 bg-white/40 rounded-full"></div>
    </div>

  </div>

</body>
</html>
